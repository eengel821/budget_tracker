site_name: Budget Tracker
site_description: Personal budget tracking application documentation
site_author: Budget Tracker
site_url: https://eengel821.github.io/budget_tracker/
repo_url: https://github.com/eengel821/budget_tracker
repo_name: eengel821/budget_tracker

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Setup & Installation: setup.md
  - CSV Import Guide: importing.md
  - Categorization Guide: categories.md
  - Adding Keywords & Categories: keywords.md
  - Budget Management: budget.md
  - Backup & Restore: backup.md
  - Development Notes: development.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Budget Tracker{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>

    <!-- Custom styles -->
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body.dark-mode { background:#1a1a2e !important; color:#e0e0e0 !important; }
        body.dark-mode .navbar.bg-dark { background:#0f0f1a !important; }
        body.dark-mode .card { background:#22223b !important; border-color:#333 !important; color:#e0e0e0 !important; }
        body.dark-mode .card-header { background:#2a2a45 !important; border-color:#444 !important; color:#e0e0e0 !important; }
        body.dark-mode .card-footer { background:#2a2a45 !important; border-color:#444 !important; }
        body.dark-mode .table { color:#e0e0e0 !important; }
        body.dark-mode .table-hover tbody tr:hover { background:#2e2e4a !important; }
        body.dark-mode .table-light { background:#2a2a45 !important; color:#e0e0e0 !important; }
        body.dark-mode .table thead th { background:#2a2a45 !important; color:#aaa !important; }
        body.dark-mode .form-select, body.dark-mode .form-control { background:#2a2a45 !important; color:#e0e0e0 !important; border-color:#555 !important; }
        body.dark-mode .btn-outline-secondary { color:#aaa !important; border-color:#666 !important; }
        body.dark-mode .btn-outline-secondary:hover { background:#444 !important; }
        body.dark-mode .stat-card { background:#2a2a45 !important; color:#e0e0e0 !important; }
        body.dark-mode .dropdown-menu { background:#22223b !important; border-color:#444 !important; }
        body.dark-mode .dropdown-item { color:#e0e0e0 !important; }
        body.dark-mode .dropdown-item:hover { background:#2e2e4a !important; }
        body.dark-mode .alert { background:#2a2a45 !important; border-color:#555 !important; color:#e0e0e0 !important; }
        body.dark-mode .badge.bg-light { background:#444 !important; color:#e0e0e0 !important; }
        body.dark-mode .text-muted { color:#aaa !important; }
        body.dark-mode .table-secondary { background:#2e2e4a !important; }
        body.dark-mode input[type="date"] { color-scheme: dark; }
        #dark-toggle i { font-size: 1rem; }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-wallet2 me-2"></i>Budget Tracker
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="/">
                            <i class="bi bi-speedometer2 me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'transactions' %}active{% endif %}" href="/transactions">
                            <i class="bi bi-list-ul me-1"></i>Transactions
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'review' %}active{% endif %}" href="/review">
                            <i class="bi bi-tags me-1"></i>Review
                            {% if uncategorized_count and uncategorized_count > 0 %}
                            <span class="badge bg-warning text-dark ms-1">{{ uncategorized_count }}</span>
                            {% endif %}
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'budget' %}active{% endif %}" href="/budget">
                            <i class="bi bi-bar-chart me-1"></i>Budget
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'categories' %}active{% endif %}" href="/categories">
                            <i class="bi bi-pie-chart me-1"></i>Categories
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="https://eengel821.github.io/budget_tracker/" target="_blank" rel="noopener">
                            <i class="bi bi-book me-1"></i>Docs <i class="bi bi-box-arrow-up-right ms-1" style="font-size:0.7rem;"></i>
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <button id="dark-toggle" class="btn btn-link nav-link" onclick="toggleDark()" title="Toggle dark mode">
                            <i class="bi bi-moon-fill" id="dark-icon"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <script>
        function toggleDark() {
            const dark = document.body.classList.toggle("dark-mode");
            document.getElementById("dark-icon").className = dark ? "bi bi-sun-fill" : "bi bi-moon-fill";
            localStorage.setItem("darkMode", dark ? "1" : "0");
        }
        if (localStorage.getItem("darkMode") === "1") {
            document.body.classList.add("dark-mode");
            document.addEventListener("DOMContentLoaded", () => {
                const icon = document.getElementById("dark-icon");
                if (icon) icon.className = "bi bi-sun-fill";
            });
        }
    </script>

    <!-- Flash messages -->
    {% if message %}
    <div class="container-fluid mt-3">
        <div class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-2"></i>{{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    </div>
    {% endif %}

    <!-- Page content -->
    <main class="container-fluid py-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    {% block scripts %}{% endblock %}
</body>
</html>

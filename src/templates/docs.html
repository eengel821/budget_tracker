{% extends "base.html" %}

{% block title %}Docs — Budget Tracker{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <h4 class="mb-0 fw-bold">Documentation</h4>
        <small class="text-muted">Reference guide for setup, importing, categorization, and more</small>
    </div>
    <a href="/documentation/" target="_blank" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-box-arrow-up-right me-1"></i>Open in new tab

<div class="card p-0" style="overflow: hidden;">
